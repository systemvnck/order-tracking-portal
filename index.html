<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINACHAKI ERP PORTAL</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #F0F2F7; 
        }
        .iframe-container {
            width: 100%;
            height: 100%;
            margin-top: -28px; /* Phép thuật kéo iframe trượt lên để giấu banner Google */
        }
        iframe {
            width: 100%;
            height: calc(100% + 28px); 
            border: none;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe src="https://script.google.com/macros/s/AKfycbzlfuU8NIOIIAnLNbPGbmeqXqaUe08Z_GPFUTrbBxfgUZ3oZe85krgfBvyjtNiPS1xGJQ/exec"></iframe>
    </div>
</body>
</html>
